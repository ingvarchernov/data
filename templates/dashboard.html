<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTF Pattern Scanner - Trading Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #4fc3f7;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(79, 195, 247, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(79, 195, 247, 0.3);
        }

        .stat-label {
            font-size: 0.9em;
            color: #9e9e9e;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #4fc3f7;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(79, 195, 247, 0.4);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 1em;
        }

        .signals-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .signal-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .signal-card:hover {
            transform: translateX(5px);
            border-color: #4fc3f7;
            box-shadow: 0 5px 20px rgba(79, 195, 247, 0.2);
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .symbol {
            font-size: 1.5em;
            font-weight: bold;
            color: #4fc3f7;
        }

        .mtf-score {
            font-size: 1.3em;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 20px;
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            color: white;
        }

        .signal-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .detail-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .detail-label {
            font-size: 0.85em;
            color: #9e9e9e;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #e0e0e0;
        }

        .direction-long {
            color: #66bb6a;
        }

        .direction-short {
            color: #ef5350;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            margin-right: 8px;
        }

        .badge-long {
            background: rgba(102, 187, 106, 0.2);
            color: #66bb6a;
            border: 1px solid #66bb6a;
        }

        .badge-short {
            background: rgba(239, 83, 80, 0.2);
            color: #ef5350;
            border: 1px solid #ef5350;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-scanning {
            background: #ffa726;
            animation: pulse 1.5s infinite;
        }

        .status-idle {
            background: #66bb6a;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #9e9e9e;
            font-size: 1.2em;
        }

        .no-signals {
            text-align: center;
            padding: 60px;
            color: #9e9e9e;
            font-size: 1.2em;
        }

        .chart-preview {
            margin-top: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-preview img {
            width: 100%;
            display: block;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #616161;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 MTF Pattern Scanner</h1>
            <p>Real-time Multi-Timeframe Pattern Detection Platform</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Status</div>
                    <div class="stat-value" id="status">
                        <span class="status-indicator status-idle"></span>
                        Ready
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Signals</div>
                    <div class="stat-value" id="total-signals">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Last Scan</div>
                    <div class="stat-value" id="last-scan">Never</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Scan Duration</div>
                    <div class="stat-value" id="scan-duration">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Connected Clients</div>
                    <div class="stat-value" id="clients">1</div>
                </div>
            </div>
        </header>

        <div class="controls">
            <button class="btn btn-primary" onclick="triggerScan()">🔄 Trigger Scan</button>
            
            <div class="filter-group">
                <label>Direction:</label>
                <select id="filter-direction" onchange="filterSignals()">
                    <option value="">All</option>
                    <option value="LONG">LONG</option>
                    <option value="SHORT">SHORT</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Min Score:</label>
                <input type="number" id="filter-score" value="0" min="0" max="100" onchange="filterSignals()">
            </div>

            <div class="filter-group">
                <label>Limit:</label>
                <select id="filter-limit" onchange="filterSignals()">
                    <option value="10">Top 10</option>
                    <option value="20">Top 20</option>
                    <option value="50">Top 50</option>
                    <option value="100" selected>Top 100</option>
                </select>
            </div>
        </div>

        <div class="signals-container">
            <h2>📊 Active Signals</h2>
            <div id="signals-list" class="loading">
                Loading signals...
            </div>
        </div>

        <footer>
            <p>MTF Pattern Scanner Platform v2.0 | © 2025</p>
        </footer>
    </div>

    <script>
        let ws = null;
        let allSignals = [];

        // Підключення до WebSocket
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('✅ WebSocket connected');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onerror = (error) => {
                console.error('❌ WebSocket error:', error);
            };
            
            ws.onclose = () => {
                console.log('⚠️ WebSocket disconnected. Reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };
        }

        // Обробка WebSocket повідомлень
        function handleWebSocketMessage(data) {
            switch(data.type) {
                case 'initial_state':
                    allSignals = data.signals || [];
                    updateStats(data.stats);
                    renderSignals(allSignals);
                    break;
                
                case 'scan_started':
                    updateStatus('scanning', 'Scanning...');
                    break;
                
                case 'scan_completed':
                    updateStatus('idle', 'Ready');
                    loadSignals();
                    break;
            }
        }

        // Оновлення статусу
        function updateStatus(status, text) {
            const statusEl = document.getElementById('status');
            const indicator = statusEl.querySelector('.status-indicator');
            
            indicator.className = `status-indicator status-${status}`;
            statusEl.innerHTML = indicator.outerHTML + text;
        }

        // Оновлення статистики
        function updateStats(stats) {
            if (stats) {
                document.getElementById('total-signals').textContent = stats.total_signals || 0;
                document.getElementById('scan-duration').textContent = 
                    stats.last_duration ? `${stats.last_duration.toFixed(1)}s` : '-';
            }
        }

        // Завантаження сигналів з API
        async function loadSignals() {
            try {
                const direction = document.getElementById('filter-direction').value;
                const minScore = document.getElementById('filter-score').value;
                const limit = document.getElementById('filter-limit').value;
                
                const params = new URLSearchParams({
                    limit,
                    min_score: minScore
                });
                
                if (direction) params.append('direction', direction);
                
                const response = await fetch(`/api/signals?${params}`);
                const data = await response.json();
                
                allSignals = data.signals || [];
                document.getElementById('total-signals').textContent = data.count || 0;
                
                renderSignals(allSignals);
                
            } catch (error) {
                console.error('Error loading signals:', error);
                document.getElementById('signals-list').innerHTML = 
                    '<div class="no-signals">Error loading signals</div>';
            }
        }

        // Відображення сигналів
        function renderSignals(signals) {
            const container = document.getElementById('signals-list');
            
            if (!signals || signals.length === 0) {
                container.innerHTML = '<div class="no-signals">No signals found</div>';
                return;
            }
            
            container.innerHTML = signals.map((signal, index) => {
                const analytics = signal.analytics || {};
                const confluence = signal.confluence || {};
                const direction = confluence.dominant_direction || 'N/A';
                const directionClass = direction === 'LONG' ? 'direction-long' : 'direction-short';
                const badgeClass = direction === 'LONG' ? 'badge-long' : 'badge-short';
                
                // Форматування цін (без зайвих нулів)
                const formatPrice = (price) => {
                    if (!price) return 'N/A';
                    const formatted = price.toString();
                    // Видаляємо зайві нулі справа після коми
                    return formatted.replace(/(\.\d*?[1-9])0+$/, '$1').replace(/\.0+$/, '');
                };
                
                // Відсотки профіту/збитку
                const tpProfit = analytics.tp_profit_pct || 0;
                const slLoss = analytics.sl_loss_pct || 0;
                const tpColor = tpProfit > 0 ? '#66bb6a' : '#ef5350';
                const slColor = slLoss < 0 ? '#ef5350' : '#66bb6a';
                
                return `
                    <div class="signal-card">
                        <div class="signal-header">
                            <div>
                                <span class="symbol">#${index + 1} ${signal.symbol}</span>
                                <span class="badge ${badgeClass}">${direction}</span>
                            </div>
                            <div class="mtf-score">${signal.mtf_score.toFixed(1)}</div>
                        </div>
                        
                        <div class="signal-details">
                            <div class="detail-item">
                                <div class="detail-label">Pattern</div>
                                <div class="detail-value">${analytics.pattern_type || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Timeframe</div>
                                <div class="detail-value">${analytics.timeframe || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Confluence</div>
                                <div class="detail-value">${((confluence.same_direction || 0) * 100).toFixed(0)}%</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Current Price</div>
                                <div class="detail-value">
                                    ${formatPrice(analytics.current_price)}
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Entry Price</div>
                                <div class="detail-value ${directionClass}">
                                    ${formatPrice(analytics.entry_price)}
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Stop Loss</div>
                                <div class="detail-value" style="color: ${slColor}">
                                    ${formatPrice(analytics.stop_loss)}
                                    <span style="font-size: 0.85em">(${slLoss > 0 ? '+' : ''}${slLoss.toFixed(1)}%)</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Take Profit</div>
                                <div class="detail-value" style="color: ${tpColor}">
                                    ${formatPrice(analytics.take_profit)}
                                    <span style="font-size: 0.85em; font-weight: bold;">(${tpProfit > 0 ? '+' : ''}${tpProfit.toFixed(1)}%)</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">R/R Ratio</div>
                                <div class="detail-value">${(analytics.risk_reward_ratio || 0).toFixed(2)}</div>
                            </div>
                        </div>
                        
                        ${signal.symbol ? `
                        <div class="chart-preview">
                            <img src="/api/charts/${signal.symbol}" 
                                 alt="${signal.symbol} chart" 
                                 onerror="this.parentElement.style.display='none'"
                                 loading="lazy">
                        </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // Фільтрація сигналів
        function filterSignals() {
            loadSignals();
        }

        // Запуск сканування
        async function triggerScan() {
            try {
                updateStatus('scanning', 'Triggering scan...');
                const response = await fetch('/api/scan/trigger', { method: 'POST' });
                const data = await response.json();
                console.log('Scan triggered:', data);
            } catch (error) {
                console.error('Error triggering scan:', error);
                updateStatus('idle', 'Error');
            }
        }

        // Завантаження статусу
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                updateStatus(data.is_scanning ? 'scanning' : 'idle', 
                           data.is_scanning ? 'Scanning...' : 'Ready');
                
                if (data.last_scan) {
                    const lastScan = new Date(data.last_scan);
                    document.getElementById('last-scan').textContent = 
                        lastScan.toLocaleTimeString();
                }
                
                document.getElementById('clients').textContent = data.connected_clients || 0;
                updateStats(data.stats);
                
            } catch (error) {
                console.error('Error loading status:', error);
            }
        }

        // Ініціалізація
        window.addEventListener('load', () => {
            connectWebSocket();
            loadStatus();
            loadSignals();
            
            // Оновлюємо статус кожні 10 секунд
            setInterval(loadStatus, 10000);
        });
    </script>
</body>
</html>
